<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, interactive-widget=resizes-content">
  <title>emu8086</title>
  <style>
    /* ---- Theme ---- */
    :root {
      color-scheme: light dark;
      --bg: light-dark(#f4f5f7, #0c0e14);
      --surface: light-dark(#fff, #151820);
      --surface-2: light-dark(#f0f1f4, #1c2028);
      --border: light-dark(rgba(0,0,0,0.08), rgba(255,255,255,0.06));
      --text: light-dark(#1a1c24, #dfe1e8);
      --text-dim: light-dark(#5a5e72, #7a8094);
      --text-muted: light-dark(#9a9eb2, #4a5068);
      --accent: light-dark(#0969da, #58a6ff);
      --accent-dim: light-dark(rgba(9,105,218,0.08), rgba(88,166,255,0.1));
      --green: light-dark(#1a7f37, #3fb950);
      --green-dim: light-dark(rgba(26,127,55,0.08), rgba(63,185,80,0.08));
      --red: light-dark(#cf222e, #f85149);
      --amber: light-dark(#9a6700, #d29922);
      --mono: 'JetBrains Mono', ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      --sans: system-ui, -apple-system, sans-serif;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Layout ---- */
    emu-shell {
      display: flex;
      flex-direction: column;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem 1rem;
      gap: 1rem;
      flex: 1;
    }

    emu-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      h1 {
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        font-family: var(--mono);
      }
      .badge {
        font-family: var(--mono);
        font-size: 0.65rem;
        font-weight: 500;
        padding: 0.2em 0.5em;
        border-radius: 4px;
        background: var(--accent-dim);
        color: var(--accent);
      }
    }

    /* ---- File loader ---- */
    emu-loader {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      label[for="file-input"] {
        font-family: var(--mono);
        font-size: 0.8rem;
        padding: 0.4em 0.8em;
        border-radius: var(--radius);
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        transition: opacity 0.15s;
        &:hover { opacity: 0.85; }
        &:active { opacity: 0.7; }
      }
      input[type="file"] {
        opacity: 0;
        position: absolute;
        pointer-events: none;
      }
      .filename {
        font-family: var(--mono);
        font-size: 0.78rem;
        color: var(--text-dim);
      }
    }

    /* ---- Controls ---- */
    emu-controls {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      button {
        font-family: var(--mono);
        font-size: 0.78rem;
        padding: 0.35em 0.7em;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        transition: background 0.1s, border-color 0.1s;
        &:hover {
          background: var(--surface-2);
          border-color: var(--accent);
        }
        &:active { opacity: 0.7; }
        &:disabled {
          opacity: 0.4;
          cursor: not-allowed;
        }
      }
      .status {
        font-family: var(--mono);
        font-size: 0.75rem;
        color: var(--text-dim);
        display: flex;
        align-items: center;
        gap: 0.3rem;
        margin-left: auto;
        .dot {
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: var(--text-muted);
        }
        &[data-state="running"] .dot { background: var(--green); }
        &[data-state="halted"] .dot { background: var(--red); }
        &[data-state="ready"] .dot { background: var(--amber); }
      }
    }

    /* ---- Tab bar (pure CSS with radio buttons) ---- */
    emu-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      gap: 0;
      label {
        font-family: var(--mono);
        font-size: 0.75rem;
        padding: 0.5em 1em;
        cursor: pointer;
        color: var(--text-dim);
        border-bottom: 2px solid transparent;
        transition: color 0.15s, border-color 0.15s;
        &:hover { color: var(--text); }
        &:has(input:checked) {
          color: var(--accent);
          border-bottom-color: var(--accent);
        }
        &:has(input:focus-visible) {
          outline: 2px solid var(--accent);
          outline-offset: -2px;
          border-radius: 4px 4px 0 0;
        }
        input {
          opacity: 0;
          position: absolute;
          pointer-events: none;
        }
      }
    }

    /* ---- Panels (CSS-only show/hide via :has) ---- */
    emu-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: opacity 0.2s;
      @starting-style { opacity: 0; }
    }

    body:has(#tab-registers:checked) #panel-registers,
    body:has(#tab-memory:checked) #panel-memory,
    body:has(#tab-output:checked) #panel-output,
    body:has(#tab-display:checked) #panel-display {
      display: block;
      opacity: 1;
    }

    /* ---- Register panel ---- */
    reg-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 1px;
      background: var(--border);
    }

    reg-cell {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0.6rem;
      background: var(--surface);
      font-family: var(--mono);
      font-size: 0.78rem;
      .name {
        color: var(--text-dim);
        font-weight: 500;
      }
      .val {
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }
      &[data-changed] .val {
        color: var(--accent);
      }
    }

    /* ---- Flags row ---- */
    flag-row {
      display: flex;
      gap: 0.35rem;
      padding: 0.5rem 0.6rem;
      flex-wrap: wrap;
      background: var(--surface);
    }

    flag-bit {
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 0.15em 0.4em;
      border-radius: 3px;
      background: var(--surface-2);
      color: var(--text-muted);
      &[data-set] {
        background: var(--green-dim);
        color: var(--green);
      }
    }

    /* ---- Memory panel ---- */
    mem-viewer {
      display: block;
      padding: 0.5rem;
    }

    mem-controls {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      padding: 0.3rem 0.2rem;
      margin-bottom: 0.4rem;
      label {
        font-family: var(--mono);
        font-size: 0.72rem;
        color: var(--text-dim);
      }
      input[type="text"] {
        font-family: var(--mono);
        font-size: 0.75rem;
        width: 6em;
        padding: 0.25em 0.4em;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--surface-2);
        color: var(--text);
        &:focus {
          outline: 2px solid var(--accent);
          outline-offset: -1px;
        }
      }
    }

    mem-hex {
      display: block;
      font-family: var(--mono);
      font-size: 0.72rem;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre;
      color: var(--text);
      padding: 0.3rem;
      .addr {
        color: var(--text-muted);
      }
      .ascii {
        color: var(--text-dim);
      }
    }

    /* ---- Display panel ---- */
    emu-display {
      display: block;
      padding: 0.5rem;
      text-align: center;
    }

    emu-display canvas {
      image-rendering: pixelated;
      background: #000;
      border-radius: 4px;
      width: 100%;
      max-width: 640px;
    }

    /* ---- Load mode select ---- */
    emu-loader select {
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 0.35em 0.5em;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
    }
    /* ---- Output panel ---- */
    emu-output {
      display: block;
      font-family: var(--mono);
      font-size: 0.82rem;
      line-height: 1.6;
      padding: 0.75rem;
      min-height: 120px;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      color: var(--text);
    }

    emu-output:empty::before {
      content: "Program output will appear here...";
      color: var(--text-muted);
      font-style: italic;
    }

    /* ---- Footer ---- */
    emu-footer {
      display: block;
      text-align: center;
      padding: 1rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-muted);
      a {
        color: var(--accent);
        text-decoration: none;
        &:hover { text-decoration: underline; }
      }
    }

    /* ---- Responsive ---- */
    @media (width <= 480px) {
      emu-shell { padding: 1rem 0.5rem; }
      reg-grid { grid-template-columns: repeat(2, 1fr); }
      mem-hex { font-size: 0.65rem; }
    }
  </style>
</head>
<body>
  <emu-shell>
    <emu-header>
      <h1>emu8086</h1>
      <span class="badge">WASM</span>
      <span class="badge">24KB</span>
    </emu-header>

    <emu-loader>
      <label for="file-input">Load</label>
      <select id="load-mode">
        <option value="com">.COM</option>
        <option value="boot">Boot Sector</option>
      </select>
      <input type="file" id="file-input" accept=".com,.COM,.bin,.img">
      <span class="filename" id="filename">No file loaded</span>
    </emu-loader>

    <emu-controls>
      <button id="btn-step" disabled>Step</button>
      <button id="btn-run" disabled>Run</button>
      <button id="btn-pause" disabled>Pause</button>
      <button id="btn-reset" disabled>Reset</button>
      <div class="status" id="status" data-state="idle">
        <span class="dot"></span>
        <span class="label">idle</span>
      </div>
    </emu-controls>

    <!-- Tab bar: pure CSS radio buttons for panel switching -->
    <emu-tabs role="radiogroup" aria-label="View tabs">
      <label><input type="radio" name="tab" id="tab-registers" checked> Registers</label>
      <label><input type="radio" name="tab" id="tab-memory"> Memory</label>
      <label><input type="radio" name="tab" id="tab-output"> Output</label>
      <label><input type="radio" name="tab" id="tab-display"> Display</label>
    </emu-tabs>

    <!-- Panels (shown/hidden by CSS :has() on the radio buttons) -->
    <emu-panel id="panel-registers">
      <reg-grid id="regs">
        <reg-cell><span class="name">AX</span><span class="val" id="r-ax">0000</span></reg-cell>
        <reg-cell><span class="name">BX</span><span class="val" id="r-bx">0000</span></reg-cell>
        <reg-cell><span class="name">CX</span><span class="val" id="r-cx">0000</span></reg-cell>
        <reg-cell><span class="name">DX</span><span class="val" id="r-dx">0000</span></reg-cell>
        <reg-cell><span class="name">SI</span><span class="val" id="r-si">0000</span></reg-cell>
        <reg-cell><span class="name">DI</span><span class="val" id="r-di">0000</span></reg-cell>
        <reg-cell><span class="name">BP</span><span class="val" id="r-bp">0000</span></reg-cell>
        <reg-cell><span class="name">SP</span><span class="val" id="r-sp">0000</span></reg-cell>
        <reg-cell><span class="name">CS</span><span class="val" id="r-cs">0000</span></reg-cell>
        <reg-cell><span class="name">DS</span><span class="val" id="r-ds">0000</span></reg-cell>
        <reg-cell><span class="name">SS</span><span class="val" id="r-ss">0000</span></reg-cell>
        <reg-cell><span class="name">ES</span><span class="val" id="r-es">0000</span></reg-cell>
        <reg-cell><span class="name">IP</span><span class="val" id="r-ip">0000</span></reg-cell>
        <reg-cell><span class="name">FLAGS</span><span class="val" id="r-flags">0000</span></reg-cell>
      </reg-grid>
      <flag-row id="flags">
        <flag-bit data-flag="CF">CF</flag-bit>
        <flag-bit data-flag="PF">PF</flag-bit>
        <flag-bit data-flag="AF">AF</flag-bit>
        <flag-bit data-flag="ZF">ZF</flag-bit>
        <flag-bit data-flag="SF">SF</flag-bit>
        <flag-bit data-flag="TF">TF</flag-bit>
        <flag-bit data-flag="IF">IF</flag-bit>
        <flag-bit data-flag="DF">DF</flag-bit>
        <flag-bit data-flag="OF">OF</flag-bit>
      </flag-row>
    </emu-panel>

    <emu-panel id="panel-memory">
      <mem-viewer>
        <mem-controls>
          <label for="mem-addr">Address:</label>
          <input type="text" id="mem-addr" value="0100" placeholder="hex">
        </mem-controls>
        <mem-hex id="mem-hex"></mem-hex>
      </mem-viewer>
    </emu-panel>

    <emu-panel id="panel-output">
      <emu-output id="output"></emu-output>
    </emu-panel>

    <emu-panel id="panel-display">
      <emu-display>
        <canvas id="display" width="640" height="400"></canvas>
      </emu-display>
    </emu-panel>
    <emu-footer>
      8086 emulator in Zig, compiled to WebAssembly.
      <a href="https://github.com/SingleStepTests/8086">Test-validated</a> against real silicon.
    </emu-footer>
  </emu-shell>

  <script src="cp437.js"></script>
  <script>
    const $ = s => document.getElementById(s);
    const hex16 = v => v.toString(16).toUpperCase().padStart(4, '0');
    const hex8 = v => v.toString(16).toUpperCase().padStart(2, '0');

    // ---- CGA 16-color palette ----
    const CGA = [
      '#000000','#0000AA','#00AA00','#00AAAA',
      '#AA0000','#AA00AA','#AA5500','#AAAAAA',
      '#555555','#5555FF','#55FF55','#55FFFF',
      '#FF5555','#FF55FF','#FFFF55','#FFFFFF',
    ];

    // ---- Keyboard scan code map ----
    const SCAN_CODES = {
      Escape:0x01,Digit1:0x02,Digit2:0x03,Digit3:0x04,Digit4:0x05,Digit5:0x06,
      Digit6:0x07,Digit7:0x08,Digit8:0x09,Digit9:0x0A,Digit0:0x0B,Minus:0x0C,
      Equal:0x0D,Backspace:0x0E,Tab:0x0F,KeyQ:0x10,KeyW:0x11,KeyE:0x12,
      KeyR:0x13,KeyT:0x14,KeyY:0x15,KeyU:0x16,KeyI:0x17,KeyO:0x18,KeyP:0x19,
      BracketLeft:0x1A,BracketRight:0x1B,Enter:0x1C,KeyA:0x1E,KeyS:0x1F,
      KeyD:0x20,KeyF:0x21,KeyG:0x22,KeyH:0x23,KeyJ:0x24,KeyK:0x25,KeyL:0x26,
      Semicolon:0x27,Quote:0x28,Backquote:0x29,Backslash:0x2B,KeyZ:0x2C,
      KeyX:0x2D,KeyC:0x2E,KeyV:0x2F,KeyB:0x30,KeyN:0x31,KeyM:0x32,
      Comma:0x33,Period:0x34,Slash:0x35,Space:0x39,
      ArrowUp:0x48,ArrowLeft:0x4B,ArrowRight:0x4D,ArrowDown:0x50,
    };

    let emu, mem, running = false, animId = null, lastProgram = null;
    const regIds = ['ax','bx','cx','dx','si','di','bp','sp','cs','ds','ss','es','ip','flags'];
    const flagBits = {CF:0, PF:2, AF:4, ZF:6, SF:7, TF:8, IF:9, DF:10, OF:11};
    let prevRegs = new Uint16Array(14);

    // Display canvas setup
    const canvas = $('display');
    const ctx = canvas.getContext('2d');
    const displayImg = ctx.createImageData(640, 400);

    async function boot() {
      try {
        let instance;
        try {
          ({ instance } = await WebAssembly.instantiateStreaming(fetch('emu8086.wasm')));
        } catch {
          const resp = await fetch('emu8086.wasm');
          const bytes = await resp.arrayBuffer();
          ({ instance } = await WebAssembly.instantiate(bytes));
        }
        emu = instance.exports;
        mem = new Uint8Array(emu.memory.buffer);
        setStatus('idle', 'idle');
        $('file-input').addEventListener('change', loadFile);
        $('btn-step').addEventListener('click', doStep);
        $('btn-run').addEventListener('click', doRun);
        $('btn-pause').addEventListener('click', doPause);
        $('btn-reset').addEventListener('click', doReset);
        $('mem-addr').addEventListener('input', updateMemory);
        // Keyboard input for the emulator
        document.addEventListener('keydown', onKey);
      } catch (err) {
        console.error('Failed to load WASM:', err);
        setStatus('halted', 'error');
        $('filename').textContent = 'WASM load failed';
      }
    }

    function onKey(e) {
      if (!emu || !lastProgram) return;
      const scan = SCAN_CODES[e.code];
      if (scan === undefined) return;
      // Prevent browser default for arrow keys, tab, etc.
      e.preventDefault();
      // Determine ASCII value
      let ascii = 0;
      if (e.key.length === 1) ascii = e.key.charCodeAt(0);
      else if (e.code === 'Enter') ascii = 0x0D;
      else if (e.code === 'Backspace') ascii = 0x08;
      else if (e.code === 'Tab') ascii = 0x09;
      else if (e.code === 'Escape') ascii = 0x1B;
      emu.push_key(scan, ascii);
    }

    async function loadFile(e) {
      const file = e.target.files[0];
      if (!file) return;
      const bytes = new Uint8Array(await file.arrayBuffer());
      lastProgram = { bytes, name: file.name, mode: $('load-mode').value };
      loadProgram(bytes, lastProgram.mode);
      $('filename').textContent = file.name;
      enableButtons(true);
      setStatus('ready', 'ready');
      updateUI();
    }

    function loadProgram(bytes, mode) {
      emu.init();
      if (mode === 'boot') {
        // Boot sector: load at 0000:7C00
        const base = emu.get_memory_ptr() + 0x7C00;
        mem.set(bytes, base);
        emu.load_boot_sector(0x7C00, bytes.length);
      } else {
        // .COM: load at 0000:0100
        const base = emu.get_memory_ptr() + 0x100;
        mem.set(bytes, base);
        emu.load_program(0x100, bytes.length);
      }
    }

    function doStep() {
      const s = emu.step();
      updateUI();
      if (s === 1) { setStatus('halted', 'halted'); enableButtons(false); $('btn-reset').disabled = false; }
      else if (s === 2) { setStatus('halted', 'unimpl'); enableButtons(false); $('btn-reset').disabled = false; }
    }

    function doRun() {
      running = true;
      $('btn-run').disabled = true;
      $('btn-pause').disabled = false;
      setStatus('running', 'running');
      tick();
    }

    function tick() {
      if (!running) return;
      const s = emu.run(10000); // 10k instructions per frame
      updateUI();
      if (s === 0) { animId = requestAnimationFrame(tick); }
      else {
        running = false;
        setStatus('halted', s === 1 ? 'halted' : 'unimpl');
        enableButtons(false); $('btn-reset').disabled = false;
      }
    }

    function doPause() {
      running = false;
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      $('btn-run').disabled = false;
      $('btn-pause').disabled = true;
      setStatus('ready', 'paused');
    }

    function doReset() {
      running = false;
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      if (lastProgram) {
        loadProgram(lastProgram.bytes, lastProgram.mode);
        prevRegs = new Uint16Array(14);
        enableButtons(true);
        setStatus('ready', 'ready');
        $('output').textContent = '';
        updateUI();
      }
    }

    function updateUI() {
      updateRegisters();
      updateFlags();
      updateMemory();
      updateOutput();
      renderDisplay();
    }

    function updateRegisters() {
      const ptr = emu.get_registers();
      const regs = new Uint16Array(emu.memory.buffer, ptr, 14);
      for (let i = 0; i < 14; i++) {
        const el = $('r-' + regIds[i]);
        el.textContent = hex16(regs[i]);
        const cell = el.closest('reg-cell');
        if (regs[i] !== prevRegs[i]) cell.setAttribute('data-changed', '');
        else cell.removeAttribute('data-changed');
      }
      prevRegs = new Uint16Array(regs);
    }

    function updateFlags() {
      const ptr = emu.get_registers();
      const flags = new Uint16Array(emu.memory.buffer, ptr, 14)[13];
      for (const [name, bit] of Object.entries(flagBits)) {
        const el = document.querySelector(`flag-bit[data-flag="${name}"]`);
        if (flags & (1 << bit)) el.setAttribute('data-set', '');
        else el.removeAttribute('data-set');
      }
    }

    function updateMemory() {
      const input = $('mem-addr').value.trim();
      const addr = parseInt(input, 16) || 0;
      const memPtr = emu ? emu.get_memory_ptr() : 0;
      if (!emu) return;
      let html = '';
      for (let row = 0; row < 16; row++) {
        const rowAddr = (addr + row * 16) & 0xFFFFF;
        html += `<span class="addr">${rowAddr.toString(16).toUpperCase().padStart(5, '0')}</span>  `;
        let ascii = '';
        for (let col = 0; col < 16; col++) {
          const a = (rowAddr + col) & 0xFFFFF;
          const b = mem[memPtr + a];
          html += hex8(b) + (col === 7 ? '  ' : ' ');
          ascii += (b >= 0x20 && b <= 0x7E) ? String.fromCharCode(b) : '.';
        }
        html += ` <span class="ascii">${ascii}</span>\n`;
      }
      $('mem-hex').innerHTML = html;
    }

    function updateOutput() {
      if (!emu) return;
      const len = emu.get_output_len();
      if (len === 0) { $('output').textContent = ''; return; }
      const ptr = emu.get_output_buf();
      const bytes = mem.slice(ptr, ptr + len);
      $('output').textContent = new TextDecoder().decode(bytes);
    }

    // ---- Text-mode display renderer ----
    // Reads 80x25 text VRAM at physical 0xB8000 and renders CP437 glyphs
    function renderDisplay() {
      if (!emu) return;
      const memPtr = emu.get_memory_ptr();
      const vramBase = memPtr + 0xB8000;
      const pixels = displayImg.data;

      for (let row = 0; row < 25; row++) {
        for (let col = 0; col < 80; col++) {
          const cellAddr = vramBase + (row * 80 + col) * 2;
          const ch = mem[cellAddr];
          const attr = mem[cellAddr + 1];
          const fg = CGA[attr & 0x0F];
          const bg = CGA[(attr >> 4) & 0x0F];
          const fgR = parseInt(fg.slice(1,3), 16);
          const fgG = parseInt(fg.slice(3,5), 16);
          const fgB = parseInt(fg.slice(5,7), 16);
          const bgR = parseInt(bg.slice(1,3), 16);
          const bgG = parseInt(bg.slice(3,5), 16);
          const bgB = parseInt(bg.slice(5,7), 16);
          const glyphOffset = ch * 16;

          for (let y = 0; y < 16; y++) {
            const scanline = CP437_FONT[glyphOffset + y];
            for (let x = 0; x < 8; x++) {
              const px = col * 8 + x;
              const py = row * 16 + y;
              const idx = (py * 640 + px) * 4;
              if (scanline & (0x80 >> x)) {
                pixels[idx] = fgR; pixels[idx+1] = fgG; pixels[idx+2] = fgB; pixels[idx+3] = 255;
              } else {
                pixels[idx] = bgR; pixels[idx+1] = bgG; pixels[idx+2] = bgB; pixels[idx+3] = 255;
              }
            }
          }
        }
      }
      ctx.putImageData(displayImg, 0, 0);
    }

    function setStatus(state, label) {
      const el = $('status');
      el.dataset.state = state;
      el.querySelector('.label').textContent = label;
    }

    function enableButtons(loaded) {
      $('btn-step').disabled = !loaded;
      $('btn-run').disabled = !loaded;
      $('btn-pause').disabled = true;
      $('btn-reset').disabled = !loaded;
    }

    boot().catch(err => console.error('boot failed:', err));
  </script>
</body>
</html>
